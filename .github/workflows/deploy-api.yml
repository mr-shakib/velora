name: Deploy API to Railway

# Web (Vercel) auto-deploys on push via Vercel's GitHub integration.
# This workflow does the same for the API (Railway) so a single push to main
# ships both. Only runs when something under api/ changes.
on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        working-directory: api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service caring-manifestation --ci
